workflows:
  ios-unsigned-ipa:
    name: iOS Unsigned IPA (AltStore)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Get Flutter packages
        script: |
          set -e
          flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          set -e
          cd ios && pod install

      - name: Build unsigned IPA
        script: |
          set -e

          echo "--- Flutter version ---"
          flutter --version

          echo "--- Generating Flutter engine and plugin registrant ---"
          flutter build ios --release --no-codesign --no-tree-shake-icons || true

          echo "--- Archiving with xcodebuild (no signing) ---"
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY="" \
            EXPANDED_CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            -archivePath "$CM_BUILD_DIR/Runner.xcarchive" \
            archive

          echo "--- Verifying archive contents ---"
          ls -lh "$CM_BUILD_DIR/Runner.xcarchive/Products/Applications/"

          echo "--- Packaging IPA ---"
          mkdir -p Payload
          cp -r "$CM_BUILD_DIR/Runner.xcarchive/Products/Applications/Runner.app" Payload/
          zip -r drivex-unsigned.ipa Payload/
          rm -rf Payload

          echo "--- Final IPA size ---"
          ls -lh drivex-unsigned.ipa

    artifacts:
      - drivex-unsigned.ipa

    publishing:
      email:
        recipients:
          - markgerbey5@gmail.com
        notify:
          success: true
          failure: true
