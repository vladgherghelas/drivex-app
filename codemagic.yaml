workflows:
  ios-unsigned-ipa:
    name: iOS Unsigned IPA (AltStore)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Get Flutter packages
        script: |
          set -e
          flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          set -e
          cd ios && pod install

      - name: Build unsigned IPA
        script: |
          set -e

          echo "--- Flutter version ---"
          flutter --version

          echo "--- Building Flutter iOS app ---"
          flutter build ios --release --no-codesign

          echo "--- Verifying Runner.app was produced ---"
          ls -lh build/ios/iphoneos/

          echo "--- Packaging IPA ---"
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r drivex-unsigned.ipa Payload/
          rm -rf Payload

          echo "--- Final IPA size ---"
          ls -lh drivex-unsigned.ipa

    artifacts:
      - drivex-unsigned.ipa

    publishing:
      email:
        recipients:
          - markgerbey5@gmail.com
        notify:
          success: true
          failure: true
