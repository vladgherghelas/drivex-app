workflows:
  ios-unsigned-ipa:
    name: iOS Unsigned IPA (AltStore)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Get Flutter packages
        script: |
          set -e
          flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          set -e
          cd ios && pod install

      - name: Strip code signing from Xcode project
        script: |
          set -e
          sed -i '' 's/DEVELOPMENT_TEAM = .*/DEVELOPMENT_TEAM = "";/' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY = .*/CODE_SIGN_IDENTITY = "";/' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGNING_REQUIRED = .*/CODE_SIGNING_REQUIRED = NO;/' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGNING_ALLOWED = .*/CODE_SIGNING_ALLOWED = NO;/' ios/Runner.xcodeproj/project.pbxproj
          echo "--- Signing settings after patch ---"
          grep -E "DEVELOPMENT_TEAM|CODE_SIGN" ios/Runner.xcodeproj/project.pbxproj

      - name: Build unsigned IPA
        script: |
          set -e

          echo "--- Flutter version ---"
          flutter --version

          echo "--- Building Flutter iOS app (no codesign) ---"
          flutter build ios --release --no-codesign --no-tree-shake-icons

          echo "--- Verifying Runner.app ---"
          ls -lh build/ios/iphoneos/

          echo "--- Packaging IPA ---"
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r drivex-unsigned.ipa Payload/
          rm -rf Payload

          echo "--- Final IPA size ---"
          ls -lh drivex-unsigned.ipa

    artifacts:
      - drivex-unsigned.ipa

    publishing:
      email:
        recipients:
          - markgerbey5@gmail.com
        notify:
          success: true
          failure: true
